[pack]
id = "desktop-django-wrap"
version = "0.1.2"
description = "Prompt-only first Phase 3 workload for Django-in-Electron wrapping plans; not a repo-mutating wrap run"

[defaults]
temperature = 0
max_tokens = 384
stream = true
warmup = 0
repetitions = 1

[[fixtures]]
id = "synthetic-django-app"
kind = "context"
path = "fixtures/synthetic-django-app.md"
description = "Portable synthetic target app description for future wrap work"

[[cases]]
id = "wrap-plan-small"
kind = "chat"
prompt_file = "prompts/wrap-plan-small.md"
fixture_refs = ["synthetic-django-app"]

[[cases]]
id = "wrap-plan-context"
kind = "chat"
prompt_file = "prompts/wrap-plan-context.md"
fixture_refs = ["synthetic-django-app"]

[scoring]
mode = "contains"
expected = "DDS_WRAP_PLAN"
