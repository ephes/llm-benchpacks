[pack]
id = "desktop-django-wrap"
version = "0.1.5"
description = "Prompt-only first Phase 3 workload for Django-in-Electron wrapping plans; not a repo-mutating wrap run"

[defaults]
temperature = 0
max_tokens = 384
stream = true
warmup = 0
repetitions = 1

[[fixtures]]
id = "synthetic-django-app"
kind = "context"
path = "fixtures/synthetic-django-app.md"
description = "Portable synthetic target app description for future wrap work"

[[fixtures]]
id = "synthetic-django-repo"
kind = "repo"
path = "fixtures/synthetic-django-repo"
description = "Compact static synthetic Django source snapshot for future repo-shaped wrap work"

[[cases]]
id = "wrap-plan-small"
kind = "chat"
prompt_file = "prompts/wrap-plan-small.md"
fixture_refs = ["synthetic-django-app", "synthetic-django-repo"]

[[cases]]
id = "wrap-plan-context"
kind = "chat"
prompt_file = "prompts/wrap-plan-context.md"
fixture_refs = ["synthetic-django-app", "synthetic-django-repo"]

[scoring]
mode = "regex"
pattern = '^DDS_WRAP_PLAN\r?\nInspect: .+\r?\nElectron shell: .+\r?\nDjango runtime: .+\r?\nPackaging: .+\r?\nVerification: .+'
